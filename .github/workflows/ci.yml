name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout mcp-gateway
        uses: actions/checkout@v4
        with:
          path: f2b-mcp-gateway

      - name: Checkout f2b-spec
        uses: actions/checkout@v4
        with:
          repository: f2b-dev/f2b-spec
          path: f2b-spec

      - name: Checkout f2b-sdk-js
        uses: actions/checkout@v4
        with:
          repository: f2b-dev/f2b-sdk-js
          path: f2b-sdk-js

      - name: Checkout f2b-sandbox
        uses: actions/checkout@v4
        with:
          repository: f2b-dev/f2b-sandbox
          path: f2b-sandbox

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install
        run: |
          pnpm install --frozen-lockfile --dir f2b-spec
          pnpm install --frozen-lockfile --dir f2b-sandbox
          pnpm install --frozen-lockfile --dir f2b-sdk-js
          pnpm install --frozen-lockfile --dir f2b-mcp-gateway

      - name: Typecheck
        working-directory: f2b-mcp-gateway
        run: pnpm typecheck

      - name: Start sandbox (fake)
        working-directory: f2b-sandbox
        run: |
          F2B_SANDBOX_BACKEND=fake F2B_AUTH_MODE=off PORT=8787 HOST=127.0.0.1 \
            DATABASE_URL=file:./data/ci-mcp.db \
            pnpm exec tsx src/server.ts &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8787/healthz && break
            sleep 0.25
          done

      - name: MCP smoke
        working-directory: f2b-mcp-gateway
        env:
          F2B_SANDBOX_URL: http://127.0.0.1:8787
        run: pnpm smoke
